<!-- POPUP -->
<div id="popup" class="popup">Booking Submitted Successfully ✅</div>

<!-- FORM -->
<div class="booking-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">

        <div class="card-box">

          <h2 class="heading text-center mb-4">Book Your Trip</h2>

          <form id="bookingForm">

            <div class="mb-3">
              <label>Full Name</label>
              <input type="text" id="name" class="form-control" placeholder="Enter name">
            </div>

            <div class="mb-3">
              <label>Email</label>
              <input type="email" id="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
              <label>Phone</label>
              <input type="tel" id="phone" class="form-control" placeholder="Enter phone">
            </div>

            <div class="mb-3">
              <label>Destination</label>
              <select id="destination" class="form-control">
                <option value="">Select</option>
                <option>Maldives</option>
                <option>Bali</option>
                <option>Dubai</option>
                <option>Switzerland</option>
                <option>Japan</option>
              </select>
            </div>

            <div class="mb-3">
              <label>Date</label>
              <input type="date" id="date" class="form-control">
            </div>

            <div class="mb-3">
              <label>Message</label>
              <textarea id="message" class="form-control" placeholder="Any request..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Submit Booking
            </button>

          </form>

        </div>

      </div>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById("bookingForm");
  const popup = document.getElementById("popup");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    // Get values
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const destination = document.getElementById("destination").value;
    const date = document.getElementById("date").value;

    // Simple validation
    if (!name || !email || !phone || !destination || !date) {
      alert("Please fill all required fields ❌");
      return;
    }

    // Show success popup
    popup.style.display = "block";

    setTimeout(() => {
      popup.style.display = "none";
    }, 3000);

    // Reset form
    form.reset();
  });
</script>
